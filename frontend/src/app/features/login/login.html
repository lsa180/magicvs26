<section class="relative pt-32 pb-20 min-h-[870px] flex items-center justify-center">
  <div class="max-w-md w-full bg-surface-container-high/60 border border-outline-variant/20 rounded-2xl p-8 shadow-2xl shadow-purple-900/30 backdrop-blur-xl">
    <h1 class="text-3xl font-headline font-bold text-white mb-6 text-center">Iniciar sesión</h1>
    <p class="text-on-surface-variant text-sm mb-8 text-center">Accede a tus mazos, historial de partidas y amigos.</p>

    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">Usuario o email</label>
        <input
          type="text"
          name="usernameOrEmail"
          [(ngModel)]="usernameOrEmail"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="juan o juan@example.com"
          required
        />
      </div>

      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="w-full arcane-gradient py-3 rounded-md font-bold text-on-primary mt-4">
        Entrar
      </button>

      <p *ngIf="message" class="text-emerald-400 text-sm mt-4 text-center">{{ message }}</p>
      <p *ngIf="error" class="text-red-400 text-sm mt-4 text-center">{{ error }}</p>
    </form>
  </div>
</section>
