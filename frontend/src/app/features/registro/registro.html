<section class="relative pt-32 pb-20 min-h-[870px] flex items-center justify-center">
  <div class="max-w-md w-full bg-surface-container-high/60 border border-outline-variant/20 rounded-2xl p-8 shadow-2xl shadow-purple-900/30 backdrop-blur-xl">
    
    <h1 class="text-3xl font-headline font-bold text-white mb-6 text-center">Crear cuenta</h1>
    <p class="text-on-surface-variant text-sm mb-8 text-center">
      Regístrate para jugar combates 1vs1 y gestionar tus mazos.
    </p>

    <form class="space-y-4" (ngSubmit)="onSubmit()">

      <!-- USERNAME -->
      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">Usuario</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          (input)="onInputChange()"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="Ej: Magicvs_Great"
          required
        />
      </div>

      <!-- EMAIL -->
      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          (input)="onInputChange()"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="magicvs@gmail.com"
          required
        />
      </div>

      <!-- PASSWORD -->
      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          (input)="onInputChange()"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="••••••••"
          required
        />
      </div>

      <!-- DISPLAY NAME -->
      <div class="space-y-2">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">
          Nombre visible (opcional)
        </label>
        <input
          type="text"
          name="displayName"
          [(ngModel)]="displayName"
          (input)="onInputChange()"
          class="w-full h-10 rounded-md bg-surface-container/80 border border-outline-variant/40 px-3 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
          placeholder="Ej: Magicvs_Great"
        />
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-3 rounded-md bg-purple-600/80 text-white font-bold tracking-wider uppercase Manrope text-sm shadow-lg shadow-purple-900/40 hover:bg-purple-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-4"
      >
        @if (!loading) {
          <span>Registrarme</span>
        } @else {
          <div class="flex items-center justify-center gap-2">
            <span class="material-symbols-outlined animate-spin text-xl">progress_activity</span>
            <span>Registrando...</span>
          </div>
        }
      </button>

      <!-- SUCCESS MESSAGE -->
      @if (message) {
        <p class="text-emerald-400 text-sm mt-4 text-center">
          {{ message }}
        </p>
      }

      <!-- ERROR MESSAGE -->
      @if (error) {
        <div
          id="registroError"
          style="background: transparent; color: #ff6b6b; padding: 0; margin-top: 8px; margin-bottom: 8px; border-radius: 0; text-align: center; font-size: 14px; font-weight: 500;"
        >
          {{ error }}
        </div>
      }

      <div class="relative py-4">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
        <div class="relative flex justify-center text-xs uppercase"><span class="px-2 bg-[#1c1b1f] text-zinc-500">O registrarse con</span></div>
      </div>

      <!-- GOOGLE BUTTON CUSTOM (100% GENERIC & FULL WIDTH) -->
      <button 
        type="button"
        (click)="onGoogleRegistro()"
        class="w-full h-11 flex items-center justify-center gap-3 bg-white hover:bg-zinc-100 text-zinc-900 font-semibold rounded-md border border-zinc-300 shadow-sm transition-all overflow-hidden active:scale-[0.98]"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span class="Manrope text-sm tracking-wide">Registrarme con Google</span>
      </button>

    </form>
  </div>
</section>
